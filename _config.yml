# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: Jackknifer 的个人博客
subtitle: 记录技术学习、阅读笔记、项目实践和阶段性想法。
description: 记录技术、阅读、项目实践和阶段性想法的个人博客。
keywords:
  - GitHub Pages
  - Hexo
  - Redefine
  - 个人博客
author: Jackknifer
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://jackknifer.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 8
  order_by: -date

# Category & Tag
default_category: 日志
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: ''
updated_option: 'empty'

# Pagination
per_page: 8
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Sitemap
sitemap:
  path: sitemap.xml

# Extensions
theme: redefine

# Deployment is handled by GitHub Actions.
deploy:
  type: ''
