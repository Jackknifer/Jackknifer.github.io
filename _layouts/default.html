<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=20260614-5' | relative_url }}">
  </head>
  <body class="{% if page.url == '/' %}is-home{% endif %}">
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}">
        <span class="brand-mark">J</span>
        <span>{{ site.author.name }}</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="{{ '/' | relative_url }}">文章</a>
        <a href="{{ '/about/' | relative_url }}">关于</a>
        <a href="{{ site.author.github }}">GitHub</a>
      </nav>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>© {{ 'now' | date: '%Y' }} {{ site.author.name }}. Powered by GitHub Pages.</p>
    </footer>
    <script src="{{ '/assets/js/docs.js?v=20260614-1' | relative_url }}"></script>
  </body>
</html>
