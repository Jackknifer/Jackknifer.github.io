---
layout: default
---

<article class="post-shell">
  <header class="post-header">
    <a class="back-link" href="{{ '/' | relative_url }}">返回文章列表</a>
    <p class="eyebrow">{{ page.date | date: '%Y-%m-%d' }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
